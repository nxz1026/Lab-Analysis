name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: python -m ruff check .

      - name: Lint (ruff format)
        # 仓库已完成全量 format 迁移，严格阳断保证不再回退
        run: python -m ruff format --check .

      - name: Audit DSPy compiled models
        # 防止改完 dspy_modules/ 源码却忘重 compile
        # STALE 即 fail,本地建议运行: python examples/compile_all_dspy_modules_v2.py
        run: python scripts/audit_dspy_models.py --ci
        env:
          CI: "true"

      - name: Test with pytest + coverage
        run: python -m pytest --cov=lab_analysis --cov-report=term-missing --cov-report=xml:coverage.xml --cov-branch
        env:
          LAB_DEID_KEY: "VW5pdFRlc3RLZXktLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLXM="

      - name: Verify module imports (smoke test)
        run: python -c "
          from lab_analysis.llm_client import call_chat, call_dashscope_multimodal, load_api_key;
          from lab_analysis.patient_id import encode, decode, validate_id_card;
          from lab_analysis.pipeline.cli import parse_args, get_deid;
          from lab_analysis.analysis.run import run;
          from lab_analysis.extract_lab_data import call_scnet_ocr, MAX_OCR_SIDE;
          assert MAX_OCR_SIDE <= 2048, 'MAX_OCR_SIDE too large for SCNet';
          print('All imports OK')
          "

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  # ----------------------------------------------------------
  # quant_eval_gate: 6 指标阈值检查 (PR 必跑, 阻断低质量 report 合入)
  # 复用 test job 的 install 缓存策略, Python 3.12 单跑即可
  # ----------------------------------------------------------
  quant_eval_gate:
    name: Quant Eval Gate (PR required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Gate on PASS fixture (expect exit 0)
        run: |
          python scripts/quant_eval_gate.py \
            --report-path tests/fixtures/quant_eval_sample_pass.json

      - name: Gate on FAIL fixture (expect detected FAIL)
        # 不靠 exit code 反向断言 (GitHub Actions runner shell 兼容差),
        # 直接检查打印里含 "❌ FAIL"
        run: |
          set +e
          output=$(python scripts/quant_eval_gate.py \
            --report-path tests/fixtures/quant_eval_sample_fail.json 2>&1)
          echo "$output"
          if echo "$output" | grep -q "❌ FAIL"; then
            echo "[OK] FAIL fixture 正确返回 FAIL"
            exit 0
          else
            echo "[ERROR] FAIL fixture 未返回 FAIL"
            exit 1
          fi

      - name: Generate markdown summary (PR visible trend)
        if: always()
        # 读取 gate 跑出的 sidecar JSON, 生成人类可读 markdown 写入 $GITHUB_STEP_SUMMARY
        # PR 页面 “Summary” tab 会自动显示, 有变化一眼可看
        run: |
          python -c "
          import json, os, sys
          p = 'tests/fixtures/quant_eval_gate_result.json'
          if not os.path.exists(p):
              print('No sidecar, skip')
              sys.exit(0)
          d = json.load(open(p))
          sha = os.environ.get('GITHUB_SHA', '?')[:7]
          run_id = os.environ.get('GITHUB_RUN_ID', '?')
          lines = [
              '## Quant Eval Gate Trend',
              '',
              f\"**Commit**: `{sha}` | **Run**: {run_id}\",
              '',
              f\"**Overall**: {'✅ PASS' if d['passed'] else '❌ FAIL'} \",
              f\"({d['n_passed']}/{d['n_total']} passed, {d['n_failed']} failed, {d['n_skipped']} skipped)\",
              '',
              '| metric | result | detail |',
              '|--------|--------|--------|',
          ]
          for r in d['details']:
              icon = '⏭️ SKIP' if r['skipped'] else '✅' if r['passed'] else '❌'
              lines.append(f\"| {r['metric']} | {icon} | {r.get('reason', '')} |\")
          out = '\n'.join(lines)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
              f.write(out + '\n')
          print(out)
          "

      - name: Upload gate sidecar artifact (commit-prefixed for trend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # name 带 commit sha 前缀, 多次运行不覆盖, 可在 Actions UI 历史 artifact 中看趋势
          name: quant-eval-gate-${{ github.sha }}
          path: tests/fixtures/quant_eval_gate_result.json
          if-no-files-found: ignore

      - name: Post PR comment (bot 贴结果到 PR 评论)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sidecar = 'tests/fixtures/quant_eval_gate_result.json';
            if (!fs.existsSync(sidecar)) {
              console.log('No sidecar, skip PR comment');
              return;
            }
            const d = JSON.parse(fs.readFileSync(sidecar, 'utf-8'));
            const sha = (process.env.GITHUB_SHA || '?').slice(0, 7);
            const runId = process.env.GITHUB_RUN_ID || '?';
            const repo = process.env.GITHUB_REPOSITORY || '';
            const runUrl = 'https://github.com/' + repo + '/actions/runs/' + runId;
            const overall = d.passed ? 'PASS' : 'FAIL';
            const overallColor = d.passed ? '2ca02c' : 'd62728';
            const lines = [
              '## Quant Eval Gate Result',
              '',
              '**Commit**: `' + sha + '` | **Run**: [' + runId + '](' + runUrl + ')',
              '',
              '**Overall**: **' + overall + '** (' + d.n_passed + '/' + d.n_total + ' passed, ' + d.n_failed + ' failed, ' + d.n_skipped + ' skipped)',
              '',
              '| metric | result | detail |',
              '|--------|--------|--------|',
            ];
            for (const r of d.details) {
              let tag = 'FAIL', emoji = 'x', color = 'd62728';
              if (r.skipped) { tag = 'SKIP'; emoji = 'white_check_mark'; color = '888888'; }
              else if (r.passed) { tag = 'PASS'; emoji = 'white_check_mark'; color = '2ca02c'; }
              lines.push('| ' + r.metric + ' | ' + tag + ' | ' + (r.reason || '') + ' |');
            }
            const body = lines.join('\n');
            const marker = '<!-- quant-eval-gate-bot -->';
            const existing = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, per_page: 100 }
            );
            const prev = existing.find(c => c.body && c.body.includes(marker));
            const fullBody = marker + '\n' + body;
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prev.id, body: fullBody,
              });
              console.log('Updated existing PR comment #' + prev.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: fullBody,
              });
              console.log('Posted new PR comment');
            }