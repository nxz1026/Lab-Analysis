name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check lab_analysis/

      - name: Test with pytest
        run: python -m pytest
        env:
          LAB_DEID_KEY: "VW5pdFRlc3RLZXktLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLXM="

      - name: Verify module imports
        run: python -c "
          from lab_analysis.llm_client import call_chat, call_dashscope_multimodal, load_api_key;
          from lab_analysis.patient_id import encode, decode, validate_id_card;
          from lab_analysis.pipeline.cli import parse_args, get_deid;
          from lab_analysis.analysis.run import run;
          print('All imports OK')
          "
