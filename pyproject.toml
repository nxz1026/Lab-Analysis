[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "lab-analysis"
version = "0.1.0"
description = "慢性胰腺炎检验数据自动化分析 Pipeline（检验 + 文献 + 影像 + 综合报告）"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "nxz1026" }]
dependencies = [
  "numpy>=1.24",
  "pandas>=2.0",
  "scipy>=1.10",
  "scikit-learn>=1.3",
  "matplotlib>=3.7",
  "requests>=2.28",
  "Pillow>=10.0",
]

[project.optional-dependencies]
dev = ["ruff>=0.4"]

[project.scripts]
lab-analysis = "lab_analysis.pipeline:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["lab_analysis*"]
